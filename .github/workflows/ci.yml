name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build core
        run: npm run build -w packages/core

      - name: Build extensions
        run: |
          for dir in packages/extensions/*/; do
            npm run build -w "${dir%/}"
          done

      - name: Build SDK and CLI
        run: |
          npm run build -w packages/sdk
          npm run build -w packages/cli

      - name: Type check all packages
        run: |
          npx tsc --noEmit -p packages/core/tsconfig.json
          for dir in packages/extensions/*/; do
            npx tsc --noEmit -p "${dir%/}/tsconfig.json"
          done
          npx tsc --noEmit -p packages/sdk/tsconfig.json
          npx tsc --noEmit -p packages/cli/tsconfig.json

      - name: Run tests
        run: npx vitest run

  validate-schemas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build core and SDK
        run: |
          npm run build -w packages/core
          npm run build -w packages/sdk

      - name: Validate example files
        run: |
          npx tsx packages/cli/src/index.ts validate examples/air.json
          npx tsx packages/cli/src/index.ts validate examples/skills/skills.json
          npx tsx packages/cli/src/index.ts validate examples/references/references.json
          npx tsx packages/cli/src/index.ts validate examples/mcp/mcp.json
          npx tsx packages/cli/src/index.ts validate examples/plugins/plugins.json
          npx tsx packages/cli/src/index.ts validate examples/roots/roots.json
          npx tsx packages/cli/src/index.ts validate examples/hooks/hooks.json
